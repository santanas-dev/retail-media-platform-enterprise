# Retail Media Platform — Feature Registry
# UI-TRUTH-001 / UI-TRUTH-BOOTSTRAP / REGISTRY-EXPAND: Ground truth for what
# end-users can actually do through the UI.
#
# Convention:
#   id:       stable feature identifier (domain.action), from user-journeys.md
#   frontend: admin-web | advertiser-web | public | service
#   name:     human-readable (Russian, user-facing name)
#   route:    entry route (only /login or a public landing page; n/a for service)
#   path:     expected click path from entry route to feature completion (n/a for service)
#   smoke:    test function name: test_uismoke__<domain>__<action> for UI; service/behavioral test name for service
#   priority: P0 (pilot) | P1 (stable release) | P2 (later)
#   roles:    list of role codes allowed to use this feature (from user-journeys.md §3)
#   status:   reachable | blocked — reachable ONLY if green smoke exists (UI) or green behavioral proof (service)
#   gap:      why blocked (only when status=blocked); reference G1–G4 where applicable
#
# OWNER: product (human). Agents must not mark a feature reachable without green proof.

