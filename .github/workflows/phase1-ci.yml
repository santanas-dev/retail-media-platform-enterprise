name: Phase 1 — Quality Gates

on:
  push:
    paths:
      - "apps/control-api/**"
      - "apps/device-gateway/**"
      - "apps/pop-ingestor/**"
      - "apps/orchestrator-worker/**"
      - "apps/adapter-workers/**"
      - "apps/admin-web/**"
      - "packages/**"
      - "infra/compose/**"
      - "tests/**"
      - "scripts/ci/**"
      - ".github/workflows/phase1-ci.yml"
  pull_request:
    paths:
      - "apps/control-api/**"
      - "apps/device-gateway/**"
      - "apps/pop-ingestor/**"
      - "apps/orchestrator-worker/**"
      - "apps/adapter-workers/**"
      - "apps/admin-web/**"
      - "packages/**"
      - "infra/compose/**"

jobs:
  python-check:
    name: Python — Syntax & Import Smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        path:
          - apps/control-api/main.py
          - apps/device-gateway/main.py
          - apps/pop-ingestor/main.py
          - apps/orchestrator-worker/main.py
          - apps/adapter-workers/mock/main.py
          - packages/domain/__init__.py
          - packages/domain/models.py
          - packages/domain/database.py
          - packages/domain/schemas.py
          - packages/domain/repository.py
          - packages/api/__init__.py
          - packages/api/dependencies.py
          - packages/api/identity.py
          - packages/api/auth.py
          - packages/security/__init__.py
          - packages/security/config.py
          - packages/security/password.py
          - packages/security/tokens.py
          - packages/security/jwt.py
          - packages/security/sanitize.py
          - packages/auth/__init__.py
          - packages/auth/schemas.py
          - packages/auth/ad_provider.py
          - packages/auth/repository.py
          - packages/auth/service.py
          - packages/observability/__init__.py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Syntax check
        run: python -m py_compile ${{ matrix.path }}
      - name: Import smoke (service entrypoints only)
        if: startsWith(matrix.path, 'apps/')
        env:
          ENVIRONMENT: dev
        run: |
          # Test that service modules import correctly.
          # pip deps are installed in CI (setup-python does not auto-install them).
          pip install fastapi uvicorn sqlalchemy PyJWT bcrypt 2>&1 | tail -1
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          path = '${{ matrix.path }}'
          mod = path.replace('/', '.').replace('.py', '')
          src = open(path).read()
          if '__name__' in src:
              src = src.split(\"if __name__\")[0]
          try:
              exec(compile(src, path, 'exec'), {'__file__': path, '__name__': mod})
              print('import OK')
          except SystemExit:
              pass  # uvicorn.run tries to parse args
          "
  python-tests:
    name: Python — Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install sqlalchemy alembic asyncpg fastapi httpx pytest bcrypt PyJWT nats-py jsonschema pyyaml
      - name: Run tests
        run: python -m pytest tests/ -v
  import-boundaries:
    name: Import Boundaries — ADR‑014
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check import boundaries
        run: python scripts/ci/check-import-boundaries.py
  json-schema:
    name: JSON Schema Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON Schema files
        run: |
          echo "Checking JSON validity..."
          for f in packages/contracts/*.schema.json; do
            echo "  $f"
            python3 -c "import json; json.load(open('$f')); print('    OK')"
          done
      - name: Schema self-validation (draft 2020-12)
        run: |
          # Verify each schema is valid against the meta-schema
          # (lightweight: just validate structure, not full meta-schema)
          python3 -c "
          import json, os
          for f in os.listdir('packages/contracts'):
              if f.endswith('.schema.json'):
                  path = os.path.join('packages/contracts', f)
                  s = json.load(open(path))
                  assert '\$schema' in s, f'{f}: missing \$schema'
                  assert '\$id' in s, f'{f}: missing \$id'
                  assert s.get('type') == 'object', f'{f}: root must be object'
                  assert 'properties' in s or 'required' in s, f'{f}: missing properties'
                  print(f'  {f}: valid')
          "

  frontend:
    name: Frontend — Install, TypeCheck, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/admin-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type-check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  docker-compose:
    name: Docker Compose Config Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file syntax
        run: |
          python3 -c "
          import yaml, sys
          try:
              with open('infra/compose/docker-compose.phase1.yml') as f:
                  d = yaml.safe_load(f)
              assert 'services' in d, 'missing services key'
              services = d['services']
              required = ['postgres', 'clickhouse', 'redis', 'nats', 'minio',
                          'control-api', 'device-gateway', 'pop-ingestor',
                          'orchestrator-worker', 'mock-adapter']
              for s in required:
                  assert s in services, f'missing service: {s}'
                  svc = services[s]
                  if s not in ('admin-web',):  # admin-web uses profiles
                      assert 'healthcheck' in svc or s in ('postgres','clickhouse','redis','nats','minio'), \
                          f'{s}: missing healthcheck'
              print(f'OK: {len(services)} services, all required present')
          except Exception as e:
              print(f'FAIL: {e}')
              sys.exit(1)
          "

  behavioral-postgres-tests:
    name: Behavioral PostgreSQL Tests — ADR‑008 Gate
    runs-on: ubuntu-latest
    needs: [python-tests, import-boundaries]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: retail_media_owner
          POSTGRES_PASSWORD: retail_media_owner_pass
          POSTGRES_DB: retail_media_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://retail_media_owner:retail_media_owner_pass@localhost:5432/retail_media_platform
      BEHAVIORAL_DB_URL: postgresql+asyncpg://retail_media_app:retail_media_app@localhost:5432/retail_media_platform
      RUN_BEHAVIORAL_TESTS: "1"
      ENVIRONMENT: dev
      JWT_SECRET: behavioral-test-secret-at-least-32-chars
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install sqlalchemy alembic asyncpg fastapi httpx pytest bcrypt PyJWT psycopg2-binary greenlet
      - name: Wait for PostgreSQL
        run: |
          ready=false
          for i in $(seq 1 30); do
            if pg_isready -h localhost -U retail_media_owner -d retail_media_platform; then
              ready=true
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          if [ "$ready" = false ]; then
            echo "::error::PostgreSQL did not become ready within 60 seconds"
            exit 1
          fi
          echo "PostgreSQL ready."
      - name: Run migrations
        working-directory: apps/control-api
        run: alembic upgrade head
      - name: Seed database
        env:
          DATABASE_URL: postgresql+asyncpg://retail_media_owner:retail_media_owner_pass@localhost:5432/retail_media_platform
        run: python3 apps/control-api/seed.py
      - name: Create app runtime role (non-superuser NOBYPASSRLS)
        run: |
          python3 -c "
          import os
          from sqlalchemy import create_engine, text
          url = os.environ['DATABASE_URL']
          engine = create_engine(url, echo=False)
          with engine.connect() as conn:
              # Create app role if not exists
              conn.execute(text('''
                  DO \$\$
                  BEGIN
                      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = ''retail_media_app'') THEN
                          CREATE ROLE retail_media_app LOGIN PASSWORD ''retail_media_app''
                              NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS;
                      END IF;
                  END \$\$;
              '''))
              conn.commit()
              # Grant schema + table + sequence access
              conn.execute(text('GRANT USAGE ON SCHEMA public TO retail_media_app'))
              conn.execute(text('GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO retail_media_app'))
              conn.execute(text('GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO retail_media_app'))
              conn.commit()
              # Verify: retail_media_app has NOBYPASSRLS
              row = conn.execute(text(
                  \"SELECT rolsuper, rolbypassrls FROM pg_roles WHERE rolname = 'retail_media_app'\"
              )).fetchone()
              assert row is not None, 'retail_media_app role not found'
              assert not row[0], 'retail_media_app must not be superuser'
              assert not row[1], 'retail_media_app must not have BYPASSRLS'
              print(f'App role created: superuser={row[0]}, bypassrls={row[1]}')
          engine.dispose()
          "
      - name: Run behavioral tests (non-BYPASSRLS app role)
        env:
          DATABASE_URL: postgresql+asyncpg://retail_media_app:retail_media_app@localhost:5432/retail_media_platform
        run: |
          # Verify app role has NOBYPASSRLS
          python3 -c "
          import os
          from sqlalchemy import create_engine, text
          engine = create_engine(os.environ['DATABASE_URL'].replace('+asyncpg',''), echo=False)
          with engine.connect() as conn:
              row = conn.execute(text(\"SELECT rolsuper, rolbypassrls FROM pg_roles WHERE rolname = 'retail_media_app'\")).fetchone()
              assert row is not None, 'retail_media_app role not found'
              assert not row[0], 'retail_media_app must not be superuser'
              assert not row[1], 'retail_media_app must not have BYPASSRLS'
              print(f'S-008 gate: app role superuser={row[0]}, bypassrls={row[1]} — OK')
          engine.dispose()
          "
          # Run behavioral tests with NOBYPASSRLS app connection
          python3 -m pytest tests/behavioral/ -v --tb=short 2>&1 | tee /tmp/behavioral-output.txt
          PYTEST_EXIT=${PIPESTATUS[0]}
          # Fail if zero tests passed (all skipped or zero collected)
          if ! grep -qE '[0-9]+ passed' /tmp/behavioral-output.txt; then
            echo "::error::No behavioral tests passed — all skipped or zero collected"
            exit 1
          fi
          exit $PYTEST_EXIT
