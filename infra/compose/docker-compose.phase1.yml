# Retail Media Platform — Phase 1 Docker Compose
#
# Starts all infrastructure and service skeletons.
# Usage: docker compose -f infra/compose/docker-compose.phase1.yml up -d

name: rmp-phase1

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: retail_media
      POSTGRES_PASSWORD: retail_media_dev
      POSTGRES_DB: retail_media_platform
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail_media -d retail_media_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse:
    # Deferred — Phase 4+. Not part of current runtime. See ADR-007.
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_USER: retail_media
      CLICKHOUSE_PASSWORD: retail_media_dev
      CLICKHOUSE_DB: retail_media_platform
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user retail_media --password retail_media_dev --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "nats server check connection --server nats://localhost:4222"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------

  control-api:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.service
      args:
        SERVICE_NAME: control-api
        SERVICE_MODULE: apps.control-api.main
        SERVICE_PORT: "8000"
    environment:
      RMP_SERVICE: control-api
      CONTROL_API_PORT: "8000"
      ENVIRONMENT: dev
      JWT_SECRET: dev-secret-do-not-use-in-production
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      DATABASE_URL: "postgresql+asyncpg://retail_media:retail_media_dev@postgres:5432/retail_media_platform"
      MINIO_INTERNAL_ENDPOINT: "minio:9000"
      MINIO_PUBLIC_ENDPOINT: "localhost:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      CREATIVE_STORAGE_BUCKET: "retail-media-creatives-dev"
      CREATIVE_AUTO_APPROVE_UPLOADS: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Manual migration + seed (run after first compose up):
    #   docker compose -f infra/compose/docker-compose.phase1.yml exec control-api \\
    #     alembic -c apps/control-api/alembic.ini upgrade head
    #   docker compose -f infra/compose/docker-compose.phase1.yml exec control-api \\
    #     python apps/control-api/seed.py
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  device-gateway:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.service
      args:
        SERVICE_NAME: device-gateway
        SERVICE_MODULE: apps.device-gateway.main
        SERVICE_PORT: "8001"
    environment:
      RMP_SERVICE: device-gateway
      DEVICE_GATEWAY_PORT: "8001"
      ENVIRONMENT: dev
      JWT_SECRET: dev-secret-do-not-use-in-production
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      DATABASE_URL: "postgresql+asyncpg://retail_media:retail_media_dev@postgres:5432/retail_media_platform"
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  pop-ingestor:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.service
      args:
        SERVICE_NAME: pop-ingestor
        SERVICE_MODULE: apps.pop-ingestor.main
        SERVICE_PORT: "8002"
    environment:
      RMP_SERVICE: pop-ingestor
      POP_INGESTOR_PORT: "8002"
      ENVIRONMENT: dev
    ports:
      - "8002:8002"
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  orchestrator-worker:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.service
      args:
        SERVICE_NAME: orchestrator-worker
        SERVICE_MODULE: apps.orchestrator-worker.main
        SERVICE_PORT: "8003"
    environment:
      RMP_SERVICE: orchestrator-worker
      ORCHESTRATOR_PORT: "8003"
      ENVIRONMENT: dev
      JWT_SECRET: dev-secret-do-not-use-in-production
      DATABASE_URL: "postgresql+asyncpg://retail_media:retail_media_dev@postgres:5432/retail_media_platform"
      NATS_URL: "nats://nats:4222"
      CAMPAIGN_CONSUMER_ENABLED: "true"
      NATS_AUTO_PROVISION: "true"
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8003/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-adapter:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.service
      args:
        SERVICE_NAME: mock-adapter
        SERVICE_MODULE: apps.adapter-workers.mock.main
        SERVICE_PORT: "8100"
    environment:
      RMP_SERVICE: adapter-mock
      MOCK_ADAPTER_PORT: "8100"
    ports:
      - "8100:8100"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8100/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # One-shot database setup (manual, profile-gated)
  # ---------------------------------------------------------------------------
  # Run with:
  #   docker compose -f infra/compose/docker-compose.phase1.yml \
  #     --profile setup run --rm db-setup
  db-setup:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.service
      args:
        SERVICE_NAME: control-api
        SERVICE_MODULE: apps.control-api.main
        SERVICE_PORT: "8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://retail_media:retail_media_dev@postgres:5432/retail_media_platform"
    command: >
      sh -c "
        echo '=== Running migrations ===' &&
        cd apps/control-api && alembic upgrade head &&
        echo '=== Running seed ===' &&
        cd /app && python apps/control-api/seed.py &&
        echo '=== DB setup complete ==='
      "
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - setup

  admin-web:
    image: node:22-alpine
    working_dir: /app
    command: ["npx", "vite", "preview", "--host", "0.0.0.0", "--port", "3000"]
    volumes:
      - ../../apps/admin-web/dist:/app/dist
    ports:
      - "3000:3000"
    profiles:
      - frontend

volumes:
  pg_data:
  ch_data:
  minio_data:
