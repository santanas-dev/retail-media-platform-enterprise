# Prometheus configuration for Retail Media Platform
#
# Scrapes control-api and device-gateway /metrics endpoints.
# Alert rules loaded from alerts.yml.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: "rmp-control-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["control-api:8000"]
        labels:
          service: "control-api"

  - job_name: "rmp-device-gateway"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["device-gateway:8001"]
        labels:
          service: "device-gateway"
